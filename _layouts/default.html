<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;padding:24px;background:#f8fafc;color:#111}
      .container{max-width:900px;margin:0 auto;background:#fff;padding:28px;border-radius:12px;box-shadow:0 6px 18px rgba(2,6,23,0.06)}
      a{color:#0369a1}
      img.placeholder{max-width:100%;height:auto;border-radius:8px}
      pre{background:#0f172a;color:#e6eef8;padding:12px;border-radius:8px;overflow:auto}
    </style>
  </head>
  <body>
    <div class="container">
      <h1>{{ page.title }}</h1>
      {{ content }}
      <hr>
      <footer style="color:#6b7280;font-size:0.9rem">Generated by Copilot — portfolio for <strong>JOHNBSE</strong></footer>
    </div>
  </body>
</html>
